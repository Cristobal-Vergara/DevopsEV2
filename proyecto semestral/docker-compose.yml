version: '3.8'

services:
  # 1. Base de Datos
  db:
    image: mysql:8.0
    container_name: db_ventas_despachos
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secretpassword
      MYSQL_DATABASE: sistema_db
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecretpassword"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db_data:/var/lib/mysql

  # 2. Backend Ventas
  backend-ventas:
    build: 
      context: ./back-Ventas_SpringBoot/Springboot-API-REST
    container_name: backend-ventas
    restart: always
    depends_on:
      - db
    ports:
      - "8081:8080"
    environment:
      - DB_ENDPOINT=db
      - DB_PORT=3306
      - DB_NAME=sistema_db
      - DB_USERNAME=root
      - DB_PASSWORD=secretpassword
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/sistema_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC

  # 3. Backend Despachos
  backend-despachos:  
    build: 
      context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
    container_name: backend-despachos
    restart: always
    depends_on:
      - db
    ports:
      - "8082:8080"
    environment:
      - DB_ENDPOINT=db
      - DB_PORT=3306
      - DB_NAME=sistema_db
      - DB_USERNAME=root
      - DB_PASSWORD=secretpassword
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/sistema_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC

  # 4. Frontend React/Vite
  frontend:
    build: 
      context: ./front_despacho
    container_name: frontend_app
    restart: always
    ports:
      - "3000:8080"
    environment:
      - VITE_API_VENTAS_URL=http://localhost:8081
      - VITE_API_DESPACHOS_URL=http://localhost:8082

volumes:
  db_data:
    name: db_data