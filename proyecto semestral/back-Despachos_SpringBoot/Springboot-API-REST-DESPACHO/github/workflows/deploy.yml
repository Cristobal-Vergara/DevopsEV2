name: CI/CD Pipeline Ventas

on:
  push:
    branches:
      - [cite_start]deploy # El pipeline se activa solo con push a esta rama [cite: 366]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Checkout del código
      uses: actions/checkout@v3

    - name: 2. Login a Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 3. Construir y Subir Imagen (Build & Push)
      uses: docker/build-push-action@v4
      with:
        context: ./back-Despachos_SpringBoot
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/backend-ventas:latest

    - name: 4. Despliegue en AWS EC2 (Deploy)
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Navegamos a la carpeta donde tienes tu docker-compose.yml en la EC2
          cd /home/ubuntu/tu-carpeta-proyecto
          
          # Descargamos la imagen más reciente que acabamos de subir [cite: 364]
          docker pull ${{ secrets.DOCKER_USERNAME }}/backend-ventas:latest
          
          # Reiniciamos SOLO este servicio sin afectar al resto (BD, Frontend, etc.)
          docker-compose up -d --no-deps backend-ventas