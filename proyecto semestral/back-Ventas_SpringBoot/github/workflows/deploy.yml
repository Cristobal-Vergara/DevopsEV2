name: CI/CD Pipeline Backend

on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push
      uses: docker/build-push-action@v4
      with:
        context: ./back-Ventas_SpringBoot
        push: true
        # Cambia el nombre de la imagen según corresponda (backend-ventas o backend-despachos)
        tags: ${{ secrets.DOCKER_USERNAME }}/nombre-de-tu-imagen:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ubuntu/proyecto-semestral
          docker pull ${{ secrets.DOCKER_USERNAME }}/nombre-de-tu-imagen:latest
          # IMPORTANTE: Cambia 'backend-ventas' por el nombre del servicio en tu docker-compose
          docker-compose up -d --no-deps backend-ventas