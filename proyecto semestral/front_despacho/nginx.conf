server {
    listen 8080;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Redirección al backend de Ventas (Usa el puerto interno 8080)
    location /api/v1/ventas {
        proxy_pass http://backend-ventas:8080;
    }

    # Redirección al backend de Despachos (Usa el puerto interno 8080)
    location /api/v1/despachos {
        proxy_pass http://backend-despachos:8080;
    }
}