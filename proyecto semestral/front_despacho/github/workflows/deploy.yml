name: CI/CD Pipeline Frontend

on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push
      uses: docker/build-push-action@v4
      with:
        context: ./front_despacho
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/frontend-despacho:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ubuntu/proyecto-semestral
          docker pull ${{ secrets.DOCKER_USERNAME }}/frontend-despacho:latest
          # Nombre del servicio en tu docker-compose
          docker-compose up -d --no-deps frontend